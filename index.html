<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0e0c0b" />
<link rel="apple-touch-icon" href="icon.png" />
<title>The Hollow Gate</title>
<meta property="og:type" content="website" />
<meta property="og:title" content="The Hollow Gate" />
<meta property="og:description" content="A dark text adventure. Choose your path. Survive the hollow." />
<meta property="og:url" content="https://TheHollowGateGame.github.io/TheHollowGate/" />
<meta property="og:image" content="https://TheHollowGateGame.github.io/TheHollowGate/og-image.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="The Hollow Gate" />
<meta name="twitter:description" content="A dark text adventure. Choose your path. Survive the hollow." />
<meta name="twitter:image" content="https://TheHollowGateGame.github.io/TheHollowGate/og-image.png" />
<style>
  :root{
    --bg:#0e0c0b; --panel:#1a1613; --ink:#e9e3d6; --muted:#8c8576;
    --accent:#e6b334; --danger:#c64e4e; --ok:#6da87e; --hp:#c64e4e;
    --xp:#e6b334; --lives:#6da87e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg)}
  body{color:var(--ink);font-family:Georgia,Times,serif}
  #app{display:grid;grid-template-rows:auto 1fr auto;max-width:860px;margin:2.5vh auto;padding:2rem;min-height:92vh;gap:1.25rem}
  header{text-align:center}
  h1{letter-spacing:.35em;font-size:clamp(1.4rem,2.6vw,2.2rem);margin:.2rem 0}
  .chapter{color:var(--accent);letter-spacing:.25em;font-size:.85rem}
  .scene{background:linear-gradient(180deg,#1f1a15,#16120f);border:1px solid #2f2720;border-radius:14px;padding:1.5rem;line-height:1.7}
  .scene pre{white-space:pre-wrap;word-wrap:break-word;font:inherit;margin:0}
  .hud{display:flex;flex-wrap:wrap;gap:.75rem 1.25rem;font-size:.85rem;color:var(--muted)}
  .hud b{color:var(--ink)}
  .party{color:var(--accent)}
  .pack{color:var(--muted)}
  .bar{display:flex;gap:1rem;flex-wrap:wrap;margin:.4rem 0}
  .bar .segment{display:flex;align-items:center;gap:.35rem}
  .bar .label{min-width:38px}
  .meter{width:120px;height:10px;background:#111;border-radius:99px;overflow:hidden;border:1px solid #2f2720}
  .meter > span{display:block;height:100%;border-radius:99px}
  .meter.xp > span{background:linear-gradient(90deg,#8a6d1b,var(--accent))}
  .meter.hp > span{background:linear-gradient(90deg,#7a2e2e,var(--danger))}
  .meter.fear > span{background:linear-gradient(90deg,#2a3540,#6fa8c8)}
  .meter.lives > span{background:linear-gradient(90deg,#2a4030,var(--ok))}
  .choices{display:flex;flex-direction:column;gap:.65rem}
  button{background:#201a14;color:#f6ead1;border:1px solid #3a3128;border-radius:10px;padding:.9rem 1.1rem;text-align:left;cursor:pointer;font:inherit;transition:transform .05s ease,background .2s ease}
  button:hover{background:#2a221a;border-color:#4d3f33}
  button:active{transform:translateY(1px)}
  button.primary{background:#2a2214;border-color:#6d5620;color:#ffe08a}
  button.primary::before{content:"▸ ";color:var(--accent)}
  .toolbar{display:flex;gap:.6rem;justify-content:flex-end;flex-wrap:wrap}
  .toolbar button{padding:.5rem .8rem;font-size:.8rem;border-radius:8px}
  footer{text-align:center;color:#5c564a;font-size:.75rem;margin-top:.5rem}
  .toast{background:#0f0d0b;border:1px solid #3a2f1e;color:#f3dc8d;padding:.6rem .9rem;border-radius:8px;margin:.4rem 0;font-size:.85rem}
  .hidden{display:none}
  .danger-zone{color:var(--danger)}
  .safe-zone{color:var(--ok)}
  @media (max-width: 540px){
    #app{padding:1rem}
    .scene{padding:1rem}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="chapter" id="chapter">LOADING</div>
    <h1>THE HOLLOW GATE</h1>
  </header>
  <main>
    <div class="scene" id="scene"><div id="story">Loading…</div></div>
    <div class="hud" id="hud"></div>
    <div class="toast hidden" id="toast"></div>
    <div class="choices" id="choices"></div>
  </main>
  <aside class="shares hidden" id="shareBar">
    <button onclick="shareOnFacebook()">Share</button>
    <button onclick="shareOnWhatsApp()">WhatsApp</button>
    <button onclick="shareViaX()">X</button>
    <button onclick="shareViaEmail()">Email</button>
  </aside>
  <footer>
    <div class="toolbar">
      <button onclick="saveGame()">Save</button>
      <button onclick="loadGame()">Load</button>
      <button onclick="resetToMenu()">New Game</button>
    </div>
  </footer>
</div>
<script>
const COMPANION_NAMES = {"ash": "Ash", "vale": "Ser Vale", "moth": "Moth", "rook": "Rook", "hedge_witch": "Hedge Witch"};
const ITEM_LABELS = {"castle_talisman": "Castle Talisman", "poultice": "Poultice", "rook_note": "Rook Note", "seeing_draught": "Seeing Draught", "shadow_blade": "Shadow Blade", "signet_ring": "Signet Ring", "supplies": "Supplies", "sword": "Sword", "tunnel_map": "Tunnel Map", "village_map": "Village Map", "warding_draught": "Warding Draught", "wardstone": "Wardstone", "mine_key": "Mine Key", "miners_journal": "Miner's Journal", "shrine_coin": "Shrine Coin", "cipher_stone": "Cipher Stone"};

let state = { 
  route: null, trust: 50, fear: 0, gold: 0, pack: [], companions: [], flags: {}, 
  here: "menu", sceneCount: 0,
  xp: 0, lives: 3, maxLives: 3, level: 1,
  dangerLevel: 0
};
let routes = {};
let scenes = {};

function pct(val, max){ return Math.max(0, Math.min(100, Math.round((val / Math.max(1, max)) * 100))); }

function toast(msg){
  try {
    const t = document.getElementById("toast");
    if (!t) return;
    t.textContent = msg;
    t.classList.remove("hidden");
    setTimeout(()=>t.classList.add("hidden"), 1800);
  } catch (e) {}
}

async function fetchJSON(path){
  const res = await fetch(path, {cache: "no-store"});
  if(!res.ok) throw new Error(`Failed: ${path} (${res.status})`);
  return res.json();
}

async function loadData(){
  const r = await fetchJSON("./routes.json");
  routes = r;
  try { state._companionNames = await fetchJSON("./companions.json"); } catch(e) { state._companionNames = {}; }
  const files = await fetchJSON("./story/index.json");
  const entries = Array.isArray(files) ? files : (files.chapters || []);
  for(const item of entries){
    const path = "./story/" + (typeof item === "string" ? item : item.file);
    const data = await fetchJSON(path);
    const arr = Array.isArray(data.scenes) ? data.scenes : [];
    for(const s of arr) scenes[s.id] = s;
  }
}

function applyDo(doList){
  if(!doList) return;
  for(const raw of doList){
    if(!raw) continue;
    const [k,v] = raw.split(":");
    if(k === "add_item"){
      if(state.pack.length < 12 && !state.pack.includes(v)) state.pack.push(v);
    } else if(k === "rem_item"){
      state.pack = state.pack.filter(x => x !== v);
    } else if(k === "gold"){
      state.gold += Number(v);
    } else if(k === "trust"){
      state.trust = Math.max(0, Math.min(100, state.trust + Number(v)));
    } else if(k === "fear"){
      state.fear = Math.max(0, Math.min(100, state.fear + Number(v)));
    } else if(k === "companion"){
      if(!state.companions.includes(v)) state.companions.push(v);
    } else if(k === "flag"){
      state.flags[v] = true;
    } else if(k === "xp"){
      state.xp += Number(v);
      checkLevelUp();
    } else if(k === "damage"){
      state.lives -= Number(v);
      if(state.lives <= 0){
        toast("You have perished…");
        setTimeout(()=>resetToMenu(), 1800);
      }
    } else if(k === "heal"){
      state.lives = Math.min(state.maxLives, state.lives + Number(v));
    }
  }
}

function checkLevelUp(){
  const xpNeeded = state.level * 100;
  if(state.xp >= xpNeeded){
    state.xp -= xpNeeded;
    state.level += 1;
    state.maxLives = Math.min(5, state.maxLives + 1);
    state.lives = Math.min(state.maxLives, state.lives + 1);
    toast(`Level up! Now level ${state.level}. Max lives: ${state.maxLives}`);
  }
}

function dangerLabel(d){
  if(d <= 1) return `<span class="safe-zone">Safe</span>`;
  if(d === 2) return `Low risk`;
  if(d === 3) return `<span class="danger-zone">Dangerous</span>`;
  if(d === 4) return `<span class="danger-zone">Deep danger</span>`;
  return `<span class="danger-zone">Lethal zone</span>`;
}

function visible(req){
  if(!req) return true;
  if(["castle_talisman","village_map","signet_ring","poultice","shadow_blade","wardstone","mine_key","shrine_coin","cipher_stone"].includes(req)){
    return state.pack.includes(req);
  }
  if(["ash","vale","moth","rook","hedge_witch"].includes(req)){
    return state.companions.includes(req);
  }
  if(req.startsWith("companion:")) return state.companions.includes(req.split(":")[1]);
  if(req.startsWith("gold:")) return state.gold >= Number(req.split(":")[1]);
  if(req.startsWith("trust:")) return state.trust >= Number(req.split(":")[1]);
  if(req.startsWith("flag:")) return !!state.flags[req.split(":")[1]];
  return true;
}

function showScene(){
  const sc = scenes[state.here];
  const box = document.getElementById("choices");
  box.innerHTML = "";
  if(!sc){
    document.getElementById("story").textContent = `Missing scene: ${state.here}`;
    document.getElementById("chapter").textContent = "ERROR";
    return;
  }
  document.getElementById("chapter").textContent = sc.chapter || "";
  let storyText = (sc.text || "");
  if(sc.danger !== undefined){
    storyText += `\n\n[Zone safety: ${dangerLabel(Number(sc.danger))}]`;
  }
  document.getElementById("story").textContent = storyText;
  let packLabel = (state.pack || []).map(it => (ITEM_LABELS[it] || it.replace(/_/g, " "))).join(", ");
  let partyParts = [];
  for(const c of state.companions) partyParts.push(COMPANION_NAMES[c] || c);
  const xpNeeded = state.level * 100;
  document.getElementById("hud").innerHTML = `
    <div>
      Lives: <b>${state.lives}/${state.maxLives}</b> &nbsp;
      Trust: <b>${state.trust}</b> &nbsp; 
      Fear: <b>${state.fear}</b> &nbsp; 
      Gold: <b>${state.gold}</b>
    </div>
    <div>
      XP: <b>${state.xp}</b>/${xpNeeded} &nbsp; Level: <b>${state.level}</b>
    </div>
    <div>Pack: <b>${packLabel || "—"}</b></div>
    ${partyParts.length ? `<div>Party: <b>${partyParts.join(", ")}</b></div>` : ""}
  `;
  const avail = [];
  for(const ch of (sc.choices || [])){
    if(visible(ch.require)) avail.push(ch);
  }
  if(!avail.length){
    box.innerHTML = `<div>No options left.</div>`;
    return;
  }
  for(const ch of avail){
    const b = document.createElement("button");
    const isPrimary = /^(fight|enter|face|use|climb|search|study|approach|talk|offer|demand|accept|reveal|stay|bring|walk|make)/i.test(ch.text || "");
    b.className = isPrimary ? "primary" : "";
    b.textContent = ch.text;
    b.onclick = () => choose(ch);
    box.appendChild(b);
  }
  state.sceneCount++;
}

function choose(ch){
  applyDo(ch.do);
  const next = ch.next;
  if(String(next).startsWith("ending")){
    showEnding(next);
    return;
  }
  if(ch.danger){
    state.dangerLevel = Math.max(0, Math.min(5, Number(ch.danger) + (Math.random() > 0.7 ? 1 : 0)));
    if(state.dangerLevel >= 5){
      toast("Run! This place is lethal.");
      const roll = Math.random();
      if(roll > 0.6){
        applyDo(["damage:1"]);
      }
    }
  } else {
    state.dangerLevel = Math.max(0, state.dangerLevel - 1);
  }
  state.here = next;
  showScene();
}

function showEnding(id){
  const msgs = {
    ending_fight: "You won by steel. The kingdom will remember your name.",
    ending_talk: "You won with words. The hollow gate closes behind you, quieter than before.",
    ending_clever: "You won with a trick the old stories never predicted.",
    ending_sacrifice: "You chose the hardest road. Some will remember. Most will never know.",
    ending_loyal: "The kingdom remembers your name. The songs say you were brave and loyal.",
    ending_love: "The kingdom gets its court pageant. The story gets its hero.\n\nBut the hero walks away with Elara — not in triumph, but in quiet.\nShe asks you once, quietly, if you would have chosen her even if the king had forbidden it.\nYou do not answer. You only smile.\nShe smiles back. That is the answer the kingdom never gets."
  };
  document.getElementById("chapter").textContent = "THE END";
  const base = msgs[id] || "The story ends here... for now.";
  document.getElementById("story").textContent = base + "\n\n" +
    "Level: " + state.level + "   XP: " + state.xp + "\n" +
    "Trust: " + state.trust + "   Fear: " + state.fear + "   Gold: " + state.gold +
    "   Pack: " + (state.pack.map(it => ITEM_LABELS[it] || it).join(", ") || "none") +
    "   Party: " + (state.companions.map(c => COMPANION_NAMES[c] || c).join(", ") || "none");
  document.getElementById("hud").innerHTML = "";
  const box = document.getElementById("choices");
  box.innerHTML = "<button class='primary' onclick='resetToMenu()'>Play again</button>";
}

function pickRoute(route){
  const r = routes[route];
  state = {
    route,
    trust: Number(r.trust) || 50,
    fear: Number(r.fear) || 0,
    gold: Number(r.gold) || 0,
    pack: (r.pack || []).slice(),
    companions: [],
    flags: {},
    here: "intro",
    sceneCount: 0,
    xp: 0, lives: 3, maxLives: 3, level: 1, dangerLevel: 0, stamp: Date.now()
  };
  toast("You are the " + route + ".");
  applyDo(["xp:50"]);
  showScene();
}

function showMenu(){
  const title = "THE HOLLOW GATE\n\nThe King's daughter is gone. The kingdom bleeds silence.\n\nWho are you?\n\n";
  const lines = [];
  for (const [key, info] of Object.entries(routes)){
    lines.push(`${key} — ${info.description || ""}`);
    lines.push(`  Starts with: ${(info.pack || []).join(", ")}${typeof info.gold !== 'undefined' ? `, ${info.gold} gold` : ''}`);
  }
  document.getElementById("story").textContent = title + lines.join("\n");
  document.getElementById("chapter").textContent = "";
  document.getElementById("hud").innerHTML = "";
  const box = document.getElementById("choices");
  box.innerHTML = "";
  for (const key of Object.keys(routes)){
    const b = document.createElement("button");
    b.className = "primary";
    b.textContent = key;
    b.onclick = () => pickRoute(key);
    box.appendChild(b);
  }
  state.here = "menu";
}

function resetToMenu(){
  showMenu();
}

function saveGame(){
  try{
    localStorage.setItem("hollowgate_save", JSON.stringify(state));
    toast("Game saved.");
  } catch(e){
    toast("Save failed.");
  }
}

function loadGame(){
  try{
    const raw = localStorage.getItem("hollowgate_save");
    if(!raw){ toast("No save found."); return; }
    const saved = JSON.parse(raw);
    state = {...saved, stamp: Date.now()};
    toast("Game loaded.");
    showScene();
  } catch(e){
    toast("Load failed.");
  }
}

async function init() {
  try {
    await loadData();
    window.__debug = {routes, scenes, keys: Object.keys(scenes)};
  } catch (err) {
    document.getElementById('story').textContent = 'Failed to load story data: ' + err;
    console.error(err);
    return;
  }
  resetToMenu();
}

function shareOnFacebook(){
  const url = encodeURIComponent(location.href);
  const quote = encodeURIComponent("I survived The Hollow Gate. Can you?");
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${quote}`, "_blank", "width=600,height=400");
}

function shareOnWhatsApp(){
  const text = encodeURIComponent("Check out The Hollow Gate - a dark text adventure game: " + location.href);
  window.open(`https://wa.me/?text=${text}`, "_blank");
}

function shareViaX(){
  const text = encodeURIComponent("I'm playing The Hollow Gate. Choose your path, survive the hollow.");
  window.open(`https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(location.href)}`);
}

function shareViaEmail(){
  const subject = encodeURIComponent("Try The Hollow Gate");
  const body = encodeURIComponent("A dark text adventure game: " + location.href);
  window.open(`mailto:?subject=${subject}&body=${body}`, "_blank");
}

addEventListener("DOMContentLoaded", () => init().catch((e) => {
  console.error(e);
  document.getElementById("story").textContent = 'Failed to load story data: ' + (e && e.message ? e.message : e);
}));
</script>
</body>
</html>
